<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OzuPlanner | We Are Closed</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            overflow: hidden;
        }

        /* Animated background shapes */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            animation: float 10s infinite ease-in-out alternate;
        }
        .circle:nth-child(1) { width: 300px; height: 300px; top: -10%; left: -10%; }
        .circle:nth-child(2) { width: 400px; height: 400px; bottom: -20%; right: -10%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-30px) scale(1.1); }
        }

        /* Glassmorphism Card */
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem 4rem;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        h1 {
            font-weight: 600;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .subtitle {
            font-weight: 300;
            color: #b0c4de;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .divider {
            width: 50px;
            height: 3px;
            background: #4facfe;
            margin: 0 auto 2rem;
            border-radius: 5px;
        }

        .contact-text {
            font-size: 0.95rem;
            color: #e0e0e0;
            margin-bottom: 1.5rem;
        }

        /* Social/Contact Links */
        .links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .links a {
            color: #ffffff;
            font-size: 1.5rem;
            text-decoration: none;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .links a:hover {
            background: #4facfe;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.4);
        }

        .footer-text {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="circle"></div>
    <div class="circle"></div>

    <div class="container">
        <h1>OzuPlanner</h1>
        <div class="subtitle">Thanks for visiting.<br>This project is currently closed.</div>
        
        <div class="divider"></div>

        <p class="contact-text">If you'd like to reach out regarding this project or other endeavors, feel free to connect with me.</p>

        <div class="links">
            <a href="mailto:faruk.avci@ozu.edu.tr" target="_blank" title="Email Me">
                <i class="fa-regular fa-envelope"></i>
            </a>
            <a href="https://linkedin.com/in/omer-faruk-avci" target="_blank" title="LinkedIn">
                <i class="fa-brands fa-linkedin-in"></i>
            </a>
            <a href="https://github.com/faruk-avci" target="_blank" title="GitHub">
                <i class="fa-brands fa-github"></i>
            </a>
        </div>
    </div>

</body>
</html>
