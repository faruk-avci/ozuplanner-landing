<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OzuPlanner</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    body {
      background: #111;
      color: #fff;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    /* Language Toggle Visibility Rules */
    body.lang-en [lang="tr"] { display: none !important; }
    body.lang-tr [lang="en"] { display: none !important; }

    .card { 
      width: 100%; 
      max-width: 800px; 
      display: flex;
      flex-direction: column;
    }

    /* Top Section */
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo { 
      font-size: clamp(1.1rem, 2vw, 1.3rem); 
      font-weight: 700; 
      letter-spacing: -0.02em;
    }
    .logo-blue { color: #3b82f6; }
    .logo-red { color: #f43f5e; }

    /* Language Switcher Buttons */
    .lang-switcher {
      display: flex;
      gap: 4px;
      background: rgba(255, 255, 255, 0.04);
      padding: 4px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .lang-btn {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .lang-btn:hover {
      color: rgba(255, 255, 255, 0.8);
    }

    .lang-btn.active {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }

    /* Mid Section */
    .badge-container {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    
    .label {
      font-size: clamp(10px, 1vw, 11px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
    }

    .label.closed {
      background: rgba(244, 63, 94, 0.1);
      color: #f43f5e;
    }

    .label.unofficial {
      background: rgba(244, 63, 94, 0.1);
      color: #f43f5e;
    }

    h1 {
      font-size: clamp(2.5rem, 7vw, 5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-bottom: 1.8rem;
      background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.6) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .note {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      font-size: clamp(0.8rem, 1.2vw, 0.9rem);
      line-height: 1.6;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.01);
      border-radius: 12px;
      padding: 16px 20px;
      max-width: 600px;
      color: rgba(255, 255, 255, 0.5);
    }

    .note a { 
      color: #3b82f6; 
      text-decoration: none; 
      font-weight: 500;
      border-bottom: 1px solid transparent;
      transition: all 0.2s ease;
    }
    
    .note a:hover { 
      color: #60a5fa; 
      border-bottom-color: #60a5fa;
    }
    
    .note i { 
      margin-top: 4px;
      color: #3b82f6; 
      font-size: 1.1rem;
    }

    /* Bottom Section */
    .bottom {
          display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .author-name {
      font-size: 0.95rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.8);
    }

    .icons { 
      display: flex; 
      gap: 1.2rem; 
      align-items: center; 
    }
    
    .icons a {
      color: rgba(255, 255, 255, 0.4);
      font-size: 1.3rem;
      text-decoration: none;
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .icons a:hover { 
      color: #fff;
      transform: translateY(-2px);
    }

    @media (max-width: 500px) {
      .bottom { 
        flex-direction: column; 
        align-items: flex-start; 
        gap: 1.5rem;
      }
      body {
        align-items: flex-start;
        padding-top: 4rem;
      }
    }
  </style>
</head>
<body class="lang-en">

<div class="card">
  <!-- Top Section -->


  <!-- Mid Section -->
  <div class="mid">
    <div class="badge-container">
      <span class="label closed" lang="en">Status: Closed</span>
      
      <span class="label unofficial" lang="en">Unofficial Student Project</span>
    </div>
    
    <h1 lang="en">OzuPlanner is no longer active.</h1>



  <!-- Bottom Section -->
  <div class="bottom">
      <div class="icons"> 
      <a href="mailto:faruk.avci@ozu.edu.tr" title="Email"><i class="fa-regular fa-envelope"></i></a>
      <a href="https://linkedin.com/in/omer-faruk-avci" target="_blank" style="color: #3b82f6;" title="LinkedIn"><i class="fa-brands fa-linkedin-in"></i></a>
      <a href="https://github.com/faruk-avci" target="_blank" title="GitHub" style="color: #ffffff;"><i class="fa-brands fa-github"></i></a>
    </div>
  </div>
</div>
  </div>

</body>
</html>
